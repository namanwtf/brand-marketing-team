pricing_strategies:
  decoy_effect:
    enabled: true
    target_tier: "middle"
  anchoring:
    enabled: true
    reference_price_ratio: 1.3
  charm_pricing:
    enabled: true
    endings: [99, 97, 95]
    price_thresholds:
      under_100: 97
      under_500: 99
      over_500: 00
  urgency_tactics:
