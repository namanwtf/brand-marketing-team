name: 🚀 Test & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm install
      
      - name: 🧪 Run skill validation
        run: node scripts/quick-test.js
      
      - name: ✅ Validate skills structure
        run: node scripts/validate-skills.js

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🏷️ Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Brand Marketing Team v3.0.0
            
            ✨ Features:
            - 20 autonomous marketing agents
            - OpenClaw native integration
            - Universal framework (any brand)
            - 30-second installation
            
            📦 Skills Included:
            - auto-setup, competitive-intel, pricing-optimizer
            - copywriting, meta-ads-optimizer, analytics-dashboard
            - page-cro, email-sequence, social-content, testing-framework
            - seo-optimizer, influencer-outreach, content-calendar
            - video-marketing, affiliate-manager, retention-analyzer
            - viral-loop-designer, market-research, pr-distributor
            - community-manager
          draft: false
          prerelease: false
